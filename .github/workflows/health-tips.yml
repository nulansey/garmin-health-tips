name: Health tips

on:
  schedule:
    # Cron times are UTC. These are 7:00, 13:00, 20:00 in Pacific/Honolulu
    # (UTC-10, no DST). If config.yaml's timezone changes, update these.
    - cron: "0 17 * * *"   # 07:00 HST — morning briefing
    - cron: "0 23 * * *"   # 13:00 HST — midday tip
    - cron: "0 6 * * *"    # 20:00 HST — evening tip
  workflow_dispatch:        # allows manual test runs from the Actions tab

concurrency:
  group: health-tips
  cancel-in-progress: false

jobs:
  send-tip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Fetch immediately before the tip rather than relying on fetch.yml's
      # schedule. That workflow asks for every 30 min but Actions throttles
      # scheduled runs to ~90 min in practice (sometimes 3h+), which left the
      # 7am briefing computing on data that predated the night's sleep.
      #
      # Best effort on purpose: both steps are continue-on-error so a Garmin
      # auth failure degrades to "tip from stored data" instead of no tip at
      # all. fetch.yml stays the run that fails loudly when tokens expire.
      - name: Restore Garmin tokens
        continue-on-error: true
        run: |
          mkdir -p ~
          echo "${{ secrets.GARMIN_TOKEN_B64 }}" | base64 -d | tar -xzf - -C ~

      - name: Fetch latest Garmin data
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python -m src.fetch

      - name: Send tip
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python -m src.main
