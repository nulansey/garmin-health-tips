name: Fetch Garmin data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:        # allows manual test runs from the Actions tab

concurrency:
  group: fetch-garmin
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # On auth failure this step/job fails immediately and stays failed
      # until someone fixes it — no retry loop. Repeated failed Garmin
      # logins every 30 min would look like credential stuffing and risk an
      # account throttle (see src/setup_auth.py). If this starts failing,
      # re-run `.venv/bin/python -m src.setup_auth` locally and update the
      # GARMIN_TOKEN_B64 secret.
      - name: Restore Garmin tokens
        run: |
          mkdir -p ~
          echo "${{ secrets.GARMIN_TOKEN_B64 }}" | base64 -d | tar -xzf - -C ~

      - name: Fetch Garmin data into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python -m src.fetch
