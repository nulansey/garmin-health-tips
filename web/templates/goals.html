{% extends "base.html" %}
{% block title %}Goals — Garmin Health Coach{% endblock %}
{% block content %}
<h1>Goals</h1>
<p class="meta">Saves are pushed to GitHub and take effect from the next tip.</p>

<form method="post" action="/goals/calorie">
  <h2>Calorie goal</h2>
  <label for="goal_type">Goal</label>
  <select name="goal_type" id="goal_type">
    {% for t in ["deficit", "maintain", "surplus"] %}
    <option value="{{ t }}" {{ 'selected' if config.goal.type == t }}>{{ t }}</option>
    {% endfor %}
  </select>
  <label for="amount">Amount (kcal below/above your typical burn)</label>
  <input type="number" name="amount" id="amount" min="0" max="2000" step="50"
         value="{{ config.goal.amount }}">
  <button type="submit">Save calorie goal</button>
</form>

<form method="post" action="/goals/targets">
  <h2>Targets</h2>
  <label for="sleep_hours">Sleep target (hours, blank = none)</label>
  <input type="number" name="sleep_hours" id="sleep_hours" min="4" max="12" step="0.5"
         value="{{ config.get('targets', {}).get('sleep_hours', '') }}">
  <label for="steps">Daily step target (blank = none)</label>
  <input type="number" name="steps" id="steps" min="1000" max="50000" step="500"
         value="{{ config.get('targets', {}).get('steps', '') }}">
  <button type="submit">Save targets</button>
</form>
{% endblock %}
